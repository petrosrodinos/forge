<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figures — The Forge</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: { fontFamily: { sans: ["Syne", "sans-serif"], mono: ["JetBrains Mono", "monospace"] } } },
    };
  </script>
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="bg-[#080810] text-slate-100 font-sans h-screen flex overflow-hidden">

  <!-- ── Left sidebar: figure list ─────────────────────────────────────────── -->
  <aside class="w-64 flex-shrink-0 bg-[#0a0a14] border-r border-[#1a1a2e] flex flex-col">

    <div class="p-4 border-b border-[#1a1a2e] flex items-center gap-3">
      <a href="/" class="text-slate-600 hover:text-slate-400 font-mono text-xs transition-colors">← Back</a>
      <div class="flex items-center gap-2 flex-1">
        <div class="w-6 h-6 rounded bg-rose-600/20 border border-rose-600/30 flex items-center justify-center flex-shrink-0">
          <span class="text-rose-400 text-[10px]">⬡</span>
        </div>
        <span class="text-xs font-bold tracking-widest text-slate-100 font-mono uppercase">Figures</span>
      </div>
    </div>

    <div class="p-3 space-y-2 border-b border-[#1a1a2e]">
      <input id="search" type="text" placeholder="Search figures…"
             class="w-full bg-[#0e0e1a] border border-[#1a1a2e] rounded px-3 py-1.5 text-xs font-mono text-slate-300 placeholder-slate-600 focus:outline-none focus:border-violet-600/50 transition-colors">
      <div class="flex gap-1">
        <button id="filter-all"   data-filter="all"      class="filter-btn active-filter flex-1 px-2 py-1 rounded text-[10px] font-mono transition-colors">All</button>
        <button id="filter-fig"   data-filter="figure"   class="filter-btn flex-1 px-2 py-1 rounded text-[10px] font-mono transition-colors">Figures</button>
        <button id="filter-obs"   data-filter="obstacle" class="filter-btn flex-1 px-2 py-1 rounded text-[10px] font-mono transition-colors">Obstacles</button>
      </div>
      <button id="btn-new"
              class="w-full px-3 py-1.5 bg-violet-600 hover:bg-violet-500 text-white text-xs font-mono rounded transition-colors flex items-center justify-center gap-1.5">
        <span>+</span> New Figure
      </button>
    </div>

    <div id="figure-list" class="flex-1 overflow-y-auto p-2 space-y-0.5">
      <!-- populated by JS -->
    </div>

    <div class="p-3 border-t border-[#1a1a2e]">
      <div id="list-count" class="text-[9px] font-mono text-slate-600 text-center">Loading…</div>
    </div>
  </aside>

  <!-- ── Main: editor ───────────────────────────────────────────────────────── -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- header -->
    <header class="h-11 border-b border-[#1a1a2e] flex items-center px-5 gap-3 flex-shrink-0">
      <div id="editor-title" class="flex-1 text-xs font-mono text-slate-500">Select a figure to edit</div>
      <div id="editor-actions" class="flex gap-2 hidden">
        <button id="btn-save"
                class="px-3 py-1.5 bg-violet-600 hover:bg-violet-500 text-white text-[11px] font-mono rounded transition-colors">
          Save Changes
        </button>
        <button id="btn-delete"
                class="px-3 py-1.5 bg-[#0e0e1a] hover:bg-red-900/30 border border-[#1a1a2e] hover:border-red-800/50 text-slate-400 hover:text-red-400 text-[11px] font-mono rounded transition-colors">
          Delete
        </button>
      </div>
      <div id="editor-create-actions" class="flex gap-2 hidden">
        <button id="btn-create"
                class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-[11px] font-mono rounded transition-colors">
          Create Figure
        </button>
        <button id="btn-cancel-new"
                class="px-3 py-1.5 bg-[#0e0e1a] border border-[#1a1a2e] text-slate-400 hover:text-slate-200 text-[11px] font-mono rounded transition-colors">
          Cancel
        </button>
      </div>
      <div id="editor-status" class="text-xs font-mono text-slate-400 min-h-[1.25rem]"></div>
    </header>

    <!-- content -->
    <div id="editor-area" class="flex-1 overflow-y-auto">

      <!-- empty state -->
      <div id="empty-state" class="h-full flex flex-col items-center justify-center gap-4 text-center p-8">
        <div class="w-14 h-14 rounded-xl bg-[#0e0e1a] border border-[#1a1a2e] flex items-center justify-center">
          <span class="text-2xl text-slate-700">⬡</span>
        </div>
        <div>
          <p class="text-sm font-mono text-slate-400">Select a figure from the list</p>
          <p class="text-xs font-mono text-slate-600 mt-1">or create a new one</p>
        </div>
        <button onclick="document.getElementById('btn-new').click()"
                class="px-4 py-2 bg-violet-600/20 border border-violet-600/30 text-violet-400 text-xs font-mono rounded hover:bg-violet-600/30 transition-colors">
          + New Figure
        </button>
      </div>

      <!-- editor form (hidden until a figure is selected/created) -->
      <form id="figure-form" class="hidden p-5 max-w-3xl space-y-6">

        <!-- meta -->
        <section class="space-y-3">
          <h2 class="text-[9px] font-mono uppercase tracking-widest text-slate-600">Identity</h2>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-mono text-slate-500 mb-1">Name</label>
              <input id="f-name" type="text"
                     class="w-full bg-[#0e0e1a] border border-[#1a1a2e] rounded px-3 py-2 text-sm font-mono text-slate-200 focus:outline-none focus:border-violet-600/50 transition-colors">
            </div>
            <div>
              <label class="block text-[10px] font-mono text-slate-500 mb-1">Type</label>
              <select id="f-type"
                      class="w-full bg-[#0e0e1a] border border-[#1a1a2e] rounded px-3 py-2 text-sm font-mono text-slate-200 focus:outline-none focus:border-violet-600/50 transition-colors">
                <option value="figure">figure</option>
                <option value="obstacle">obstacle</option>
              </select>
            </div>
          </div>
        </section>

        <!-- default design -->
        <section class="space-y-3">
          <h2 class="text-[9px] font-mono uppercase tracking-widest text-slate-600">Default Design</h2>
          <div id="default-variants" class="rounded-lg border border-[#1a1a2e] overflow-hidden">
            <div class="flex border-b border-[#1a1a2e]">
              <button type="button" data-variant-tab="default-A"
                      class="variant-tab active-variant-tab flex-1 px-4 py-2 text-[10px] font-mono transition-colors">
                ☀ Variant A — Player 1 (Light)
              </button>
              <button type="button" data-variant-tab="default-B"
                      class="variant-tab flex-1 px-4 py-2 text-[10px] font-mono transition-colors">
                ☾ Variant B — Player 2 (Dark)
              </button>
            </div>
            <div id="default-A-panel" class="p-4 space-y-3">
              <div class="flex justify-end">
                <button type="button" onclick="window.__toggleVariantAi('default-A')"
                        class="text-[10px] font-mono text-violet-400 hover:text-violet-300 px-2 py-1 bg-violet-600/10 border border-violet-600/20 hover:border-violet-600/40 rounded transition-colors">✦ AI Fill</button>
              </div>
              <div id="variant-ai-default-A" class="hidden rounded border border-violet-600/20 bg-violet-600/5 p-2.5 space-y-2">
                <textarea id="variant-ai-desc-default-A" rows="1" placeholder="Describe what you want for the light variant…"
                          onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))window.__generateVariant('default-A','A')"
                          class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-2 py-1.5 text-xs font-mono text-slate-300 placeholder-slate-600 focus:outline-none focus:border-violet-600/40 resize-none leading-relaxed"></textarea>
                <div class="flex items-center gap-2">
                  <button type="button" onclick="window.__generateVariant('default-A','A')"
                          class="px-2.5 py-1 bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white text-[10px] font-mono rounded transition-colors">✦ Generate</button>
                  <span id="variant-ai-status-default-A" class="text-xs font-mono text-slate-400 min-h-[1.25rem]"></span>
                </div>
              </div>
              <div>
                <label class="block text-[10px] font-mono text-slate-500 mb-1">Model</label>
                <div id="f-default-A-model-wrap"></div>
              </div>
              <div>
                <label class="block text-[10px] font-mono text-slate-500 mb-1">Prompt</label>
                <textarea id="f-default-A-prompt" rows="4"
                          class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-3 py-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-violet-600/50 transition-colors resize-none leading-relaxed"></textarea>
              </div>
              <div>
                <label class="block text-[10px] font-mono text-slate-500 mb-1">Negative Prompt <span class="text-slate-700">(optional)</span></label>
                <textarea id="f-default-A-neg" rows="2"
                          class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-3 py-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-violet-600/50 transition-colors resize-none leading-relaxed"></textarea>
              </div>
              <input type="hidden" id="f-default-A-images" value="[]">
              <div class="flex items-center gap-2 pt-1">
                <button type="button" data-gen-img-btn="default-A" onclick="window.__generateImage('default-A')"
                        class="px-2.5 py-1 bg-emerald-700 hover:bg-emerald-600 disabled:opacity-40 text-white text-[10px] font-mono rounded transition-colors">⬡ Generate Image</button>
                <span id="img-status-default-A" class="text-xs font-mono text-slate-400 min-h-[1.25rem] flex items-center"></span>
              </div>
              <div id="img-gallery-default-A" class="hidden space-y-1.5"></div>
            </div>
            <div id="default-B-panel" class="p-4 space-y-3 hidden">
              <div class="flex justify-end">
                <button type="button" onclick="window.__toggleVariantAi('default-B')"
                        class="text-[10px] font-mono text-violet-400 hover:text-violet-300 px-2 py-1 bg-violet-600/10 border border-violet-600/20 hover:border-violet-600/40 rounded transition-colors">✦ AI Fill</button>
              </div>
              <div id="variant-ai-default-B" class="hidden rounded border border-violet-600/20 bg-violet-600/5 p-2.5 space-y-2">
                <textarea id="variant-ai-desc-default-B" rows="1" placeholder="Describe what you want for the dark variant…"
                          onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))window.__generateVariant('default-B','B')"
                          class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-2 py-1.5 text-xs font-mono text-slate-300 placeholder-slate-600 focus:outline-none focus:border-violet-600/40 resize-none leading-relaxed"></textarea>
                <div class="flex items-center gap-2">
                  <button type="button" onclick="window.__generateVariant('default-B','B')"
                          class="px-2.5 py-1 bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white text-[10px] font-mono rounded transition-colors">✦ Generate</button>
                  <span id="variant-ai-status-default-B" class="text-xs font-mono text-slate-400 min-h-[1.25rem]"></span>
                </div>
              </div>
              <div>
                <label class="block text-[10px] font-mono text-slate-500 mb-1">Model</label>
                <div id="f-default-B-model-wrap"></div>
              </div>
              <div>
                <label class="block text-[10px] font-mono text-slate-500 mb-1">Prompt</label>
                <textarea id="f-default-B-prompt" rows="4"
                          class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-3 py-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-violet-600/50 transition-colors resize-none leading-relaxed"></textarea>
              </div>
              <div>
                <label class="block text-[10px] font-mono text-slate-500 mb-1">Negative Prompt <span class="text-slate-700">(optional)</span></label>
                <textarea id="f-default-B-neg" rows="2"
                          class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-3 py-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-violet-600/50 transition-colors resize-none leading-relaxed"></textarea>
              </div>
              <input type="hidden" id="f-default-B-images" value="[]">
              <div class="flex items-center gap-2 pt-1">
                <button type="button" data-gen-img-btn="default-B" onclick="window.__generateImage('default-B')"
                        class="px-2.5 py-1 bg-emerald-700 hover:bg-emerald-600 disabled:opacity-40 text-white text-[10px] font-mono rounded transition-colors">⬡ Generate Image</button>
                <span id="img-status-default-B" class="text-xs font-mono text-slate-400 min-h-[1.25rem] flex items-center"></span>
              </div>
              <div id="img-gallery-default-B" class="hidden space-y-1.5"></div>
            </div>
          </div>
        </section>

        <!-- skins -->
        <section class="space-y-3">
          <div class="flex items-center justify-between">
            <h2 class="text-[9px] font-mono uppercase tracking-widest text-slate-600">Skins</h2>
            <button type="button" id="btn-add-skin"
                    class="text-[10px] font-mono text-violet-400 hover:text-violet-300 px-2 py-1 border border-violet-600/20 hover:border-violet-600/40 rounded transition-colors">
              + Add Skin
            </button>
          </div>
          <div id="skins-container" class="space-y-3"></div>
        </section>

        <!-- CLI reference -->
        <section class="space-y-2">
          <button type="button" id="btn-toggle-cli"
                  class="flex items-center gap-2 text-[9px] font-mono uppercase tracking-widest text-slate-600 hover:text-slate-500 transition-colors">
            <span id="cli-arrow">▶</span> CLI Commands
          </button>
          <div id="cli-panel" class="hidden rounded-lg border border-[#1a1a2e] bg-[#080810] p-4 space-y-3">
            <p class="text-[9px] font-mono text-slate-600">Use these commands in the agent CLI or AI chat:</p>
            <div id="cli-commands" class="space-y-2 text-xs font-mono text-slate-400"></div>
          </div>
        </section>

      </form>
    </div>
  </main>

  <style>
    .filter-btn { color: #64748b; background: transparent; }
    .filter-btn:hover { color: #94a3b8; background: rgba(255,255,255,0.04); }
    .active-filter { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .figure-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; }
    .figure-item:hover { background: rgba(255,255,255,0.04); border-color: #1a1a2e; }
    .figure-item.selected { background: rgba(124,58,237,0.1); border-color: rgba(124,58,237,0.25); }
    .variant-tab { color: #475569; background: #0a0a14; }
    .variant-tab:hover { color: #94a3b8; }
    .active-variant-tab { color: #f1f5f9; background: #0e0e1a; }
    .skin-card { border: 1px solid #1a1a2e; border-radius: 8px; overflow: hidden; }
    .skin-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: #0a0a14; }
    .skin-header:hover { background: #0e0e1a; }
    .skin-body { background: #080810; }
    .skin-variant-tab { flex: 1; padding: 6px 12px; font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #475569; background: #0a0a14; transition: all 0.12s; }
    .skin-variant-tab:hover { color: #94a3b8; }
    .active-skin-variant-tab { color: #f1f5f9; background: #0e0e1a; }
    .img-carousel-viewport { overflow: hidden; border-radius: 0.5rem; }
    .img-carousel-track { display: flex; transition: transform 0.3s ease-out; }
    .img-carousel-slide { flex: 0 0 auto; box-sizing: border-box; }
  </style>

  <script type="module">
    // ── State ──────────────────────────────────────────────────────────────────
    let allFigures = [];
    let imageModels = [];           // [{ id, label }] loaded from /api/aiml/models
    let selectedName = null;        // original name of the figure being edited
    let isCreating = false;
    let currentFilter = "all";
    let skinCount = 0;  // for generating unique skin IDs
    /** @type {Record<string, number>} current slide index per gallery prefix (2 images per slide) */
    let galleryCarouselSlide = {};

    // ── API ────────────────────────────────────────────────────────────────────

    async function apiFetch(path, opts = {}) {
      const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`);
      return data;
    }

    const api = {
      list:   ()           => apiFetch("/api/figures"),
      get:    (name)       => apiFetch(`/api/figures/${encodeURIComponent(name)}`),
      create: (figure)     => apiFetch("/api/figures", { method: "POST", body: JSON.stringify(figure) }),
      update: (name, fig)  => apiFetch(`/api/figures/${encodeURIComponent(name)}`, { method: "PUT", body: JSON.stringify(fig) }),
      delete: (name)       => apiFetch(`/api/figures/${encodeURIComponent(name)}`, { method: "DELETE" }),
    };

    // ── Init ───────────────────────────────────────────────────────────────────

    async function init() {
      wireFilterButtons();
      wireVariantTabs("default-A", "default-B", "default-A-panel", "default-B-panel");
      document.getElementById("btn-new").addEventListener("click", showCreateForm);
      document.getElementById("btn-save").addEventListener("click", handleSave);
      document.getElementById("btn-create").addEventListener("click", handleCreate);
      document.getElementById("btn-delete").addEventListener("click", handleDelete);
      document.getElementById("btn-cancel-new").addEventListener("click", cancelNew);
      document.getElementById("btn-add-skin").addEventListener("click", () => addSkinCard());
      document.getElementById("btn-toggle-cli").addEventListener("click", toggleCli);
      document.getElementById("search").addEventListener("input", renderList);
      // models must resolve before figures so dropdowns are ready when any figure is clicked
      await loadImageModels();
      await loadFigures();
    }

    async function loadImageModels() {
      try {
        const data = await apiFetch("/api/aiml/models");
        imageModels = Array.isArray(data) && data.length > 0 ? data : fallbackModels();
      } catch {
        imageModels = fallbackModels();
      }
    }

    function fallbackModels() {
      return [
        { id: "flux-pro/v1.1-ultra" },
        { id: "flux-pro/v1.1" },
        { id: "flux-pro" },
        { id: "flux/dev" },
        { id: "flux/schnell" },
        { id: "dall-e-3" },
      ];
    }

    const IMAGE_MODEL_PREFERENCE = [
      "flux-pro/v1.1-ultra",
      "flux-pro/v1.1",
      "blackforestlabs/flux-2-max",
      "blackforestlabs/flux-2-pro",
      "flux-pro",
      "flux/dev",
      "flux/schnell",
    ];

    function bestDefaultModel() {
      const ids = imageModels.map(m => m.id);
      return IMAGE_MODEL_PREFERENCE.find(p => ids.includes(p)) ?? ids[0] ?? "flux/dev";
    }

    function modelSelectHtml(inputId, selectedValue) {
      const opts = imageModels.map(m =>
        `<option value="${escAttr(m.id)}" ${m.id === selectedValue ? "selected" : ""}>${escHtml(m.id)}</option>`
      ).join("");
      return `<select id="${inputId}"
               class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-3 py-1.5 text-xs font-mono text-slate-300 focus:outline-none focus:border-violet-600/50 transition-colors">${opts}</select>`;
    }

    async function loadFigures() {
      try {
        allFigures = await api.list();
        renderList();  // imageModels is always ready before this runs
      } catch (err) {
        setStatus("Failed to load: " + err.message, true);
      }
    }

    // ── Image prompt: images[] (url + models3d + animations) / legacy imageUrls ─

    function cloneModel3d(m) {
      return {
        ...m,
        animations: Array.isArray(m.animations) ? m.animations.map(a => ({ ...a })) : [],
      };
    }

    function normalizeImagesFromPrompt(ip) {
      if (!ip || typeof ip !== "object") return [];
      if (Array.isArray(ip.images) && ip.images.length > 0) {
        return ip.images.map(entry => {
          if (typeof entry === "string") return { url: entry, models3d: [] };
          return {
            url: typeof entry.url === "string" ? entry.url : "",
            selectedModel3dId: entry.selectedModel3dId === undefined ? undefined : entry.selectedModel3dId,
            models3d: Array.isArray(entry.models3d) ? entry.models3d.map(cloneModel3d) : [],
          };
        });
      }
      const urls = ip.imageUrls;
      if (Array.isArray(urls))
        return urls.filter(u => typeof u === "string").map(url => ({ url, models3d: [] }));
      return [];
    }

    function readImagesInput(prefix) {
      const el = document.getElementById(`f-${prefix}-images`);
      const raw = el?.value ?? "[]";
      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map(entry => {
          if (typeof entry === "string") return { url: entry, models3d: [] };
          return {
            url: typeof entry.url === "string" ? entry.url : "",
            selectedModel3dId: entry.selectedModel3dId,
            models3d: Array.isArray(entry.models3d) ? entry.models3d.map(cloneModel3d) : [],
          };
        }).filter(a => a.url);
      } catch {
        return [];
      }
    }

    function writeImagesInput(prefix, images) {
      const el = document.getElementById(`f-${prefix}-images`);
      if (el) el.value = JSON.stringify(images);
    }

    function newAssetId() {
      return globalThis.crypto?.randomUUID?.() ?? `${Date.now()}-${Math.random().toString(36).slice(2, 11)}`;
    }

    async function pollTripoTaskUntilDone(taskId) {
      const bad = new Set(["failed", "cancelled", "banned", "expired"]);
      for (;;) {
        const res = await fetch(`/api/tripo/task/${encodeURIComponent(taskId)}`);
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
        const task = body.data;
        if (!task) throw new Error("Invalid task response");
        if (task.status === "success") return task;
        if (bad.has(task.status)) throw new Error(task.error_msg || `Task ${task.status}`);
        await new Promise(r => setTimeout(r, 2000));
      }
    }

    function updateModel3dById(prefix, imageIndex, genId, fn) {
      const images = readImagesInput(prefix);
      const list = images[imageIndex]?.models3d;
      if (!list) return;
      const i = list.findIndex(g => g.id === genId);
      if (i === -1) return;
      list[i] = fn({ ...list[i] });
      writeImagesInput(prefix, images);
    }

    // ── List rendering ─────────────────────────────────────────────────────────

    function firstImageUrlFromPrompt(ip) {
      if (!ip) return null;
      const imgs = normalizeImagesFromPrompt(ip);
      return imgs[0]?.url || ip.imageUrls?.[0] || null;
    }

    function figureThumb(f) {
      return firstImageUrlFromPrompt(f.default?.variantA?.imagePrompt)
          || firstImageUrlFromPrompt(f.default?.variantB?.imagePrompt)
          || firstImageUrlFromPrompt(f.skins?.[0]?.variantA?.imagePrompt)
          || firstImageUrlFromPrompt(f.skins?.[0]?.variantB?.imagePrompt)
          || null;
    }

    function renderList() {
      const query = document.getElementById("search").value.toLowerCase();
      const list = document.getElementById("figure-list");
      const filtered = allFigures.filter(f => {
        if (currentFilter !== "all" && f.type !== currentFilter) return false;
        if (query && !f.name.toLowerCase().includes(query)) return false;
        return true;
      });

      list.innerHTML = filtered.map(f => {
        const skinCount = f.skins?.length ?? 0;
        const typeColor = f.type === "figure" ? "text-violet-400" : "text-emerald-400";
        const isSelected = f.name === selectedName && !isCreating;
        const thumb = figureThumb(f);
        return `
          <div class="figure-item ${isSelected ? "selected" : ""} flex gap-2 items-center" data-name="${escHtml(f.name)}"
               onclick="window.__selectFigure('${escHtml(f.name)}')">
            <div class="w-9 h-9 rounded overflow-hidden border border-[#1a1a2e] flex-shrink-0 bg-[#0a0a14]">
              ${thumb
                ? `<img src="${escHtml(thumb)}" class="w-full h-full object-cover" loading="lazy" alt="">`
                : `<div class="w-full h-full flex items-center justify-center text-slate-700 text-[11px]">⬡</div>`}
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-mono text-slate-200 truncate">${escHtml(f.name)}</div>
              <div class="flex items-center gap-2 mt-0.5">
                <span class="text-[9px] font-mono ${typeColor}">${f.type}</span>
                ${skinCount > 0 ? `<span class="text-[9px] font-mono text-slate-600">${skinCount} skin${skinCount !== 1 ? "s" : ""}</span>` : ""}
              </div>
            </div>
          </div>`;
      }).join("");

      document.getElementById("list-count").textContent =
        `${filtered.length} of ${allFigures.length} items`;
    }

    window.__selectFigure = async function(name) {
      if (isCreating) {
        if (!confirm("Discard new figure?")) return;
        isCreating = false;
      }
      selectedName = name;
      const figure = allFigures.find(f => f.name === name);
      if (figure) populateForm(figure);
      renderList();
    };

    // ── Form population ────────────────────────────────────────────────────────

    function populateForm(figure) {
      galleryCarouselSlide = {};
      document.getElementById("empty-state").classList.add("hidden");
      document.getElementById("figure-form").classList.remove("hidden");
      document.getElementById("editor-title").textContent = figure.name;
      showEditorMode("edit");

      document.getElementById("f-name").value = figure.name;
      document.getElementById("f-type").value = figure.type ?? "figure";

      const dA = figure.default?.variantA?.imagePrompt ?? {};
      const dB = figure.default?.variantB?.imagePrompt ?? {};
      setVariantFields("default-A", dA);
      setVariantFields("default-B", dB);

      // skins
      const container = document.getElementById("skins-container");
      container.innerHTML = "";
      skinCount = 0;
      (figure.skins ?? []).forEach(skin => addSkinCard(skin));

      updateCliPanel(figure.name);
    }

    function setVariantFields(prefix, ip) {
      const wrap = document.getElementById(`f-${prefix}-model-wrap`);
      if (wrap) wrap.innerHTML = modelSelectHtml(`f-${prefix}-model`, ip.model ?? bestDefaultModel());
      document.getElementById(`f-${prefix}-prompt`).value = ip.prompt ?? "";
      document.getElementById(`f-${prefix}-neg`).value = ip.negativePrompt ?? "";
      const images = normalizeImagesFromPrompt(ip);
      writeImagesInput(prefix, images);
      renderImageGallery(prefix, images);
    }

    function getVariantFields(prefix) {
      const modelEl = document.getElementById(`f-${prefix}-model`);
      const model = modelEl?.value?.trim() ?? bestDefaultModel();
      const prompt = document.getElementById(`f-${prefix}-prompt`).value.trim();
      const neg = document.getElementById(`f-${prefix}-neg`).value.trim();
      const images = readImagesInput(prefix);
      const ip = { model, prompt };
      if (neg) ip.negativePrompt = neg;
      if (images.length) {
        ip.images = images;
        ip.imageUrls = images.map(i => i.url).filter(Boolean);
      }
      return { imagePrompt: ip };
    }

    function serializeForm() {
      const name = document.getElementById("f-name").value.trim();
      const type = document.getElementById("f-type").value;
      const figure = {
        name,
        type,
        default: {
          variantA: getVariantFields("default-A"),
          variantB: getVariantFields("default-B"),
        },
        skins: collectSkins(),
      };
      return figure;
    }

    // ── Skins ──────────────────────────────────────────────────────────────────

    function addSkinCard(skin = null, highlight = false) {
      const id = skinCount++;
      const skinName = skin?.name ?? "";
      const sA = skin?.variantA?.imagePrompt ?? {};
      const sB = skin?.variantB?.imagePrompt ?? {};

      const card = document.createElement("div");
      card.className = "skin-card";
      card.dataset.skinId = id;
      card.innerHTML = `
        <div class="skin-header" onclick="window.__toggleSkin(${id})">
          <span class="text-[10px] font-mono text-slate-500 flex-1" id="skin-title-${id}">
            ${skinName ? escHtml(skinName) : "New Skin"}
          </span>
          <span id="skin-arrow-${id}" class="text-[10px] text-slate-600">▼</span>
          <button type="button" onclick="event.stopPropagation(); window.__removeSkin(${id})"
                  class="text-[10px] font-mono text-slate-600 hover:text-red-400 px-1 transition-colors">✕</button>
        </div>
        <div id="skin-body-${id}" class="skin-body">
          <div class="px-4 pt-3 pb-2">
            <label class="block text-[10px] font-mono text-slate-500 mb-1">Skin Name</label>
            <input id="skin-name-${id}" type="text" value="${escAttr(skinName)}" placeholder="e.g. Spartan"
                   oninput="window.__updateSkinTitle(${id}, this.value)"
                   class="w-full bg-[#0e0e1a] border border-[#1a1a2e] rounded px-3 py-1.5 text-xs font-mono text-slate-300 focus:outline-none focus:border-violet-600/50 transition-colors">
          </div>
          <div class="flex border-t border-b border-[#1a1a2e]">
            <button type="button" data-skin-tab="${id}-A"
                    class="skin-variant-tab active-skin-variant-tab"
                    onclick="window.__switchSkinTab(${id}, 'A')">☀ Variant A</button>
            <button type="button" data-skin-tab="${id}-B"
                    class="skin-variant-tab"
                    onclick="window.__switchSkinTab(${id}, 'B')">☾ Variant B</button>
          </div>
          <div id="skin-A-panel-${id}" class="p-4 space-y-3">
            ${variantFieldsHtml(`skin-${id}-A`, sA, 'A')}
          </div>
          <div id="skin-B-panel-${id}" class="p-4 space-y-3 hidden">
            ${variantFieldsHtml(`skin-${id}-B`, sB, 'B')}
          </div>
        </div>`;
      document.getElementById("skins-container").appendChild(card);

      if (highlight) {
        card.style.transition = "border-color 1.8s ease, box-shadow 1.8s ease";
        card.style.borderColor = "rgba(124,58,237,0.6)";
        card.style.boxShadow = "0 0 0 1px rgba(124,58,237,0.2)";
        setTimeout(() => { card.style.borderColor = ""; card.style.boxShadow = ""; }, 2000);
      }
    }

    const IMAGES_PER_CAROUSEL_SLIDE = 2;

    function chunkImagesForCarousel(images, chunkSize) {
      const slides = [];
      for (let i = 0; i < images.length; i += chunkSize) slides.push(images.slice(i, i + chunkSize));
      return slides;
    }

    function models3dListHtml(prefix, imageIndex, asset) {
      const models = asset.models3d ?? [];
      if (!models.length) return "";
      const prefixJson = JSON.stringify(prefix);
      return `<div class="px-2 py-2.5 space-y-2 border-t border-[#2a2a45] bg-[#12121f]">
        ${models.map((g, gi) => {
          const sel = asset.selectedModel3dId === g.id;
          const statusClass = g.status === "success" ? "text-emerald-300" : g.status === "failed" ? "text-red-300" : "text-amber-300";
          const url = g.pbrModelUrl || g.modelUrl;
          const idJson = JSON.stringify(g.id);
          const errTip = g.error ? escAttr(g.error) : "";
          return `<div class="flex items-center gap-2 flex-wrap text-sm font-mono leading-normal min-h-[2rem] rounded-md px-2 py-1.5 bg-[#0e0e18] border border-[#252538] ${statusClass}">
            <span class="font-bold text-slate-100 tabular-nums shrink-0">${sel ? "★ " : ""}Mesh ${gi + 1}</span>
            <span class="text-slate-200 capitalize font-medium">${g.status}</span>
            ${url ? `<a href="${escHtml(url)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-2 py-1 rounded-md text-xs font-bold uppercase tracking-wide bg-violet-600 text-white hover:bg-violet-500 border border-violet-400/60 shadow-sm">Open mesh</a>` : ""}
            ${g.status === "success" && url ? `<button type="button" class="inline-flex items-center px-2 py-1 rounded-md text-xs font-bold uppercase tracking-wide border shadow-sm ${sel ? "bg-amber-500/25 text-amber-200 border-amber-400/50" : "bg-slate-600 text-slate-100 border-slate-500 hover:bg-slate-500"}" onclick='window.__selectModel3d(${prefixJson}, ${imageIndex}, ${idJson})'>${sel ? "Active" : "Use mesh"}</button>` : ""}
            ${g.error ? `<span class="text-red-300 max-w-[12rem] truncate text-xs font-medium" title="${errTip}">⚠ error</span>` : ""}
          </div>`;
        }).join("")}
      </div>`;
    }

    function singleImageCellHtml(prefix, asset, globalIndex) {
      const prefixJson = JSON.stringify(prefix);
      const url = asset.url || "";
      const label = `Generated ${globalIndex + 1}`;
      return `
            <div class="flex flex-col min-h-0 rounded overflow-hidden border border-[#1a1a2e] bg-[#0a0a14]">
              <div class="relative group flex-shrink-0">
                <img src="${escHtml(url)}" loading="lazy" class="w-full aspect-square object-cover" alt="${escAttr(label)}">
                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-colors pointer-events-none"></div>
                <button type="button" onclick='window.__removeImage(${prefixJson}, ${globalIndex})'
                        class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 bg-black/70 hover:bg-red-900/80 text-red-400 rounded px-1.5 py-0.5 text-[9px] font-mono transition-all z-10">✕</button>
                <a href="${escHtml(url)}" target="_blank" rel="noopener noreferrer"
                   class="absolute bottom-1 right-1 opacity-0 group-hover:opacity-100 bg-black/70 text-slate-300 rounded px-1.5 py-0.5 text-[9px] font-mono transition-all z-10">↗</a>
              </div>
              <button type="button" onclick='window.__mesh3dFromImage(${prefixJson}, ${globalIndex})'
                      class="w-full min-h-[2.25rem] py-2 px-2 text-[11px] font-mono font-medium tracking-wide bg-cyan-600 hover:bg-cyan-500 text-white border-t border-cyan-500/40 shadow-inner transition-colors">Create 3D mesh</button>
              ${models3dListHtml(prefix, globalIndex, asset)}
            </div>`;
    }

    function imageGalleryInnerHtml(prefix, images) {
      if (!images.length) return "";
      const slides = chunkImagesForCarousel(images, IMAGES_PER_CAROUSEL_SLIDE);
      const numSlides = slides.length;
      const slidePct = 100 / numSlides;
      let current = galleryCarouselSlide[prefix] ?? 0;
      if (current >= numSlides) current = numSlides - 1;
      if (current < 0) current = 0;
      galleryCarouselSlide[prefix] = current;

      const slidesHtml = slides.map((pair, si) => {
        const cells = pair.map((asset, j) => {
          const globalIndex = si * IMAGES_PER_CAROUSEL_SLIDE + j;
          return singleImageCellHtml(prefix, asset, globalIndex);
        });
        if (pair.length === 1) cells.push('<div class="rounded border border-dashed border-[#1a1a2e] bg-[#0a0a14]/50 min-h-[4rem]" aria-hidden="true"></div>');
        return `
          <div class="img-carousel-slide grid grid-cols-2 gap-1.5" style="width: ${slidePct}%; padding: 0 2px;">
            ${cells.join("")}
          </div>`;
      }).join("");

      const atStart = current <= 0;
      const atEnd = current >= numSlides - 1;
      const prefixJs = JSON.stringify(prefix);

      return `
        <div class="flex items-center justify-between gap-2">
          <label class="text-xs font-mono text-slate-400">Generated Images (${images.length})</label>
          <span class="text-xs font-mono text-slate-500 tabular-nums">${current + 1} / ${numSlides}</span>
        </div>
        <div class="flex items-stretch gap-1.5">
          <button type="button" aria-label="Previous images"
                  onclick='window.__carouselStep(${prefixJs}, -1)'
                  class="flex-shrink-0 self-center w-8 h-8 rounded border border-[#1a1a2e] bg-[#0e0e1a] text-slate-400 hover:text-slate-200 hover:border-violet-600/40 text-sm font-mono transition-colors disabled:opacity-30 disabled:pointer-events-none"
                  ${atStart ? "disabled" : ""}>‹</button>
          <div class="img-carousel-viewport flex-1 min-w-0 border border-[#1a1a2e] bg-[#080810]">
            <div class="img-carousel-track" style="width: ${numSlides * 100}%; transform: translateX(-${(current / numSlides) * 100}%);">
              ${slidesHtml}
            </div>
          </div>
          <button type="button" aria-label="Next images"
                  onclick='window.__carouselStep(${prefixJs}, 1)'
                  class="flex-shrink-0 self-center w-8 h-8 rounded border border-[#1a1a2e] bg-[#0e0e1a] text-slate-400 hover:text-slate-200 hover:border-violet-600/40 text-sm font-mono transition-colors disabled:opacity-30 disabled:pointer-events-none"
                  ${atEnd ? "disabled" : ""}>›</button>
        </div>`;
    }

    window.__carouselStep = function(prefix, delta) {
      const images = readImagesInput(prefix);
      if (!images.length) return;
      const numSlides = Math.ceil(images.length / IMAGES_PER_CAROUSEL_SLIDE);
      let s = galleryCarouselSlide[prefix] ?? 0;
      s = Math.max(0, Math.min(numSlides - 1, s + delta));
      galleryCarouselSlide[prefix] = s;
      renderImageGallery(prefix, images);
    };

    window.__selectModel3d = async function(prefix, imageIndex, modelId) {
      const images = readImagesInput(prefix);
      if (!images[imageIndex]) return;
      images[imageIndex].selectedModel3dId = modelId;
      writeImagesInput(prefix, images);
      renderImageGallery(prefix, images);
      await autoSaveFigure();
    };

    window.__mesh3dFromImage = async function(prefix, imageIndex) {
      const images = readImagesInput(prefix);
      const asset = images[imageIndex];
      if (!asset?.url) return;
      const genId = newAssetId();
      const gen = {
        id: genId,
        createdAt: new Date().toISOString(),
        status: "running",
        animations: [],
      };
      if (!asset.models3d) asset.models3d = [];
      asset.models3d.push(gen);
      writeImagesInput(prefix, images);
      renderImageGallery(prefix, images);

      try {
        const start = await apiFetch("/api/tripo/mesh-from-image-url", {
          method: "POST",
          body: JSON.stringify({ imageUrl: asset.url }),
        });
        if (start.error) throw new Error(start.error);
        const meshTaskId = start.meshTaskId;
        if (!meshTaskId) throw new Error("No meshTaskId");
        updateModel3dById(prefix, imageIndex, genId, g => ({ ...g, meshTaskId }));
        renderImageGallery(prefix, readImagesInput(prefix));
        const task = await pollTripoTaskUntilDone(meshTaskId);
        const pbr = task.output?.pbr_model;
        const model = task.output?.model ?? pbr;
        updateModel3dById(prefix, imageIndex, genId, g => ({
          ...g,
          status: "success",
          meshTaskId,
          pbrModelUrl: pbr,
          modelUrl: model,
        }));
      } catch (err) {
        updateModel3dById(prefix, imageIndex, genId, g => ({
          ...g,
          status: "failed",
          error: err instanceof Error ? err.message : String(err),
        }));
      } finally {
        renderImageGallery(prefix, readImagesInput(prefix));
        await autoSaveFigure();
      }
    };

    function renderImageGallery(prefix, images) {
      const gallery = document.getElementById(`img-gallery-${prefix}`);
      if (!gallery) return;
      gallery.classList.toggle("hidden", !images.length);
      gallery.innerHTML = imageGalleryInnerHtml(prefix, images);
    }

    window.__generateImage = async function(prefix) {
      const model  = document.getElementById(`f-${prefix}-model`)?.value?.trim();
      const prompt = document.getElementById(`f-${prefix}-prompt`)?.value?.trim();
      const neg    = document.getElementById(`f-${prefix}-neg`)?.value?.trim();
      const statusEl = document.getElementById(`img-status-${prefix}`);
      const btn = document.querySelector(`[data-gen-img-btn="${prefix}"]`);

      if (!prompt) { statusEl.textContent = "Add a prompt first"; return; }

      if (btn) btn.disabled = true;
      statusEl.textContent = "Generating…";
      statusEl.style.color = "";

      try {
        const body = { model, prompt };
        if (neg) body.negativePrompt = neg;
        const data = await apiFetch("/api/aiml/generate", {
          method: "POST",
          body: JSON.stringify(body),
        });
        if (data.error) throw new Error(data.error);

        const first = data.data?.[0];
        const url = first?.url ?? (first?.b64_json ? `data:image/png;base64,${first.b64_json}` : null);
        if (!url) throw new Error("No image in response");

        const images = readImagesInput(prefix);
        images.push({ url, models3d: [] });
        writeImagesInput(prefix, images);
        renderImageGallery(prefix, images);

        statusEl.textContent = "Saved";
        await autoSaveFigure();
        setTimeout(() => { statusEl.textContent = ""; }, 2000);
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        statusEl.style.color = "#fca5a5";
      } finally {
        if (btn) btn.disabled = false;
      }
    };

    window.__removeImage = async function(prefix, index) {
      const images = readImagesInput(prefix);
      images.splice(index, 1);
      writeImagesInput(prefix, images);
      renderImageGallery(prefix, images);
      await autoSaveFigure();
    };

    async function autoSaveFigure() {
      if (!selectedName || isCreating) return;
      try {
        const figure = serializeForm();
        const saved = await api.update(selectedName, figure);
        const idx = allFigures.findIndex(f => f.name === selectedName);
        if (idx !== -1) allFigures[idx] = saved;
        renderList();
      } catch { /* silent — user can still manually save */ }
    }

    window.__toggleVariantAi = function(prefix) {
      const panel = document.getElementById(`variant-ai-${prefix}`);
      const hidden = panel.classList.toggle("hidden");
      if (!hidden) document.getElementById(`variant-ai-desc-${prefix}`)?.focus();
      else document.getElementById(`variant-ai-status-${prefix}`).textContent = "";
    };

    window.__generateVariant = async function(prefix, variant) {
      const descEl = document.getElementById(`variant-ai-desc-${prefix}`);
      const statusEl = document.getElementById(`variant-ai-status-${prefix}`);
      const genBtn = document.getElementById(`variant-ai-${prefix}`)?.querySelector("button");

      const description = descEl?.value.trim();

      if (genBtn) genBtn.disabled = true;
      statusEl.textContent = "Generating…";
      statusEl.style.color = "";

      try {
        // derive the other variant prefix for cross-reference
        const otherPrefix = prefix.endsWith("-A")
          ? prefix.slice(0, -2) + "-B"
          : prefix.slice(0, -2) + "-A";

        // skin name is available when prefix is "skin-{id}-{V}"
        let skinName = "";
        const skinMatch = prefix.match(/^skin-(\d+)-/);
        if (skinMatch) skinName = document.getElementById(`skin-name-${skinMatch[1]}`)?.value.trim() ?? "";

        const context = {
          figureName:        document.getElementById("f-name").value.trim(),
          figureType:        document.getElementById("f-type").value,
          skinName,
          existingModel:     document.getElementById(`f-${prefix}-model`)?.value.trim(),
          existingPrompt:    document.getElementById(`f-${prefix}-prompt`)?.value.trim(),
          existingNegPrompt: document.getElementById(`f-${prefix}-neg`)?.value.trim(),
          otherVariantPrompt: document.getElementById(`f-${otherPrefix}-prompt`)?.value.trim(),
        };

        const result = await apiFetch("/api/figures/ai-variant", {
          method: "POST",
          body: JSON.stringify({ description, variant, context, availableModels: imageModels }),
        });

        // populate model select — add the returned model if not already present
        const modelEl = document.getElementById(`f-${prefix}-model`);
        if (modelEl && result.model) {
          if (!Array.from(modelEl.options).some(o => o.value === result.model)) {
            modelEl.add(new Option(result.model, result.model));
          }
          modelEl.value = result.model;
        }
        if (result.prompt)        document.getElementById(`f-${prefix}-prompt`).value = result.prompt;
        if (result.negativePrompt !== undefined) document.getElementById(`f-${prefix}-neg`).value = result.negativePrompt ?? "";

        document.getElementById(`variant-ai-${prefix}`)?.classList.add("hidden");
        descEl.value = "";
        statusEl.textContent = "";
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        statusEl.style.color = "#fca5a5";
      } finally {
        if (genBtn) genBtn.disabled = false;
      }
    };

    function variantFieldsHtml(prefix, ip, variant) {
      const placeholder = variant === "A"
        ? "Describe what you want for the light variant…"
        : "Describe what you want for the dark variant…";
      return `
        <div class="flex justify-end">
          <button type="button" onclick="window.__toggleVariantAi('${prefix}')"
                  class="text-[10px] font-mono text-violet-400 hover:text-violet-300 px-2 py-1 bg-violet-600/10 border border-violet-600/20 hover:border-violet-600/40 rounded transition-colors">✦ AI Fill</button>
        </div>
        <div id="variant-ai-${prefix}" class="hidden rounded border border-violet-600/20 bg-violet-600/5 p-2.5 space-y-2">
          <textarea id="variant-ai-desc-${prefix}" rows="1" placeholder="${placeholder}"
                    onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))window.__generateVariant('${prefix}','${variant}')"
                    class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-2 py-1.5 text-xs font-mono text-slate-300 placeholder-slate-600 focus:outline-none focus:border-violet-600/40 resize-none leading-relaxed"></textarea>
          <div class="flex items-center gap-2">
            <button type="button" onclick="window.__generateVariant('${prefix}','${variant}')"
                    class="px-2.5 py-1 bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white text-[10px] font-mono rounded transition-colors">✦ Generate</button>
            <span id="variant-ai-status-${prefix}" class="text-xs font-mono text-slate-400 min-h-[1.25rem]"></span>
          </div>
        </div>
        <div>
          <label class="block text-[10px] font-mono text-slate-500 mb-1">Model</label>
          ${modelSelectHtml(`f-${prefix}-model`, ip.model ?? bestDefaultModel())}
        </div>
        <div>
          <label class="block text-[10px] font-mono text-slate-500 mb-1">Prompt</label>
          <textarea id="f-${prefix}-prompt" rows="3"
                    class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-3 py-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-violet-600/50 transition-colors resize-none leading-relaxed">${escHtml(ip.prompt ?? '')}</textarea>
        </div>
        <div>
          <label class="block text-[10px] font-mono text-slate-500 mb-1">Negative Prompt <span class="text-slate-700">(optional)</span></label>
          <textarea id="f-${prefix}-neg" rows="2"
                    class="w-full bg-[#080810] border border-[#1a1a2e] rounded px-3 py-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-violet-600/50 transition-colors resize-none leading-relaxed">${escHtml(ip.negativePrompt ?? '')}</textarea>
        </div>
        <input type="hidden" id="f-${prefix}-images" value="${escAttr(JSON.stringify(normalizeImagesFromPrompt(ip)))}">
        <div class="flex items-center gap-2 pt-1">
          <button type="button" data-gen-img-btn="${prefix}" onclick="window.__generateImage('${prefix}')"
                  class="px-2.5 py-1 bg-emerald-700 hover:bg-emerald-600 disabled:opacity-40 text-white text-[10px] font-mono rounded transition-colors">⬡ Generate Image</button>
          <span id="img-status-${prefix}" class="text-xs font-mono text-slate-400 min-h-[1.25rem] flex items-center"></span>
        </div>
        <div id="img-gallery-${prefix}" class="${normalizeImagesFromPrompt(ip).length ? '' : 'hidden'} space-y-1.5">
          ${imageGalleryInnerHtml(prefix, normalizeImagesFromPrompt(ip))}
        </div>`;
    }

    function collectSkins() {
      const container = document.getElementById("skins-container");
      return Array.from(container.querySelectorAll("[data-skin-id]")).map(card => {
        const id = card.dataset.skinId;
        return {
          name: document.getElementById(`skin-name-${id}`)?.value.trim() ?? "",
          variantA: getVariantFields(`skin-${id}-A`),
          variantB: getVariantFields(`skin-${id}-B`),
        };
      });
    }

    window.__toggleSkin = function(id) {
      const body = document.getElementById(`skin-body-${id}`);
      const arrow = document.getElementById(`skin-arrow-${id}`);
      const isHidden = body.classList.toggle("hidden");
      arrow.textContent = isHidden ? "▶" : "▼";
    };

    window.__removeSkin = function(id) {
      document.querySelector(`[data-skin-id="${id}"]`)?.remove();
    };

    window.__updateSkinTitle = function(id, value) {
      document.getElementById(`skin-title-${id}`).textContent = value || "New Skin";
    };

    window.__switchSkinTab = function(id, variant) {
      const panels = { A: `skin-A-panel-${id}`, B: `skin-B-panel-${id}` };
      Object.entries(panels).forEach(([v, panelId]) => {
        document.getElementById(panelId).classList.toggle("hidden", v !== variant);
      });
      document.querySelectorAll(`[data-skin-tab="${id}-A"], [data-skin-tab="${id}-B"]`).forEach(btn => {
        btn.classList.toggle("active-skin-variant-tab", btn.dataset.skinTab === `${id}-${variant}`);
      });
    };

    // ── Create / Edit / Delete ─────────────────────────────────────────────────

    function showCreateForm() {
      galleryCarouselSlide = {};
      isCreating = true;
      selectedName = null;
      document.getElementById("empty-state").classList.add("hidden");
      document.getElementById("figure-form").classList.remove("hidden");
      document.getElementById("editor-title").textContent = "New Figure";
      showEditorMode("create");

      document.getElementById("f-name").value = "";
      document.getElementById("f-type").value = "figure";
      // setVariantFields seeds model dropdowns and clears text fields
      ["default-A", "default-B"].forEach(p => setVariantFields(p, { model: bestDefaultModel() }));
      document.getElementById("skins-container").innerHTML = "";
      skinCount = 0;
      document.getElementById("f-name").focus();
      renderList();
    }

    function cancelNew() {
      isCreating = false;
      selectedName = null;
      document.getElementById("empty-state").classList.remove("hidden");
      document.getElementById("figure-form").classList.add("hidden");
      showEditorMode("none");
      renderList();
    }

    async function handleSave() {
      const figure = serializeForm();
      if (!figure.name) { setStatus("Name is required", true); return; }
      try {
        setStatus("Saving…");
        await api.update(selectedName, figure);
        selectedName = figure.name;
        allFigures = await api.list();
        renderList();
        setStatus("Saved ✓");
        document.getElementById("editor-title").textContent = figure.name;
        updateCliPanel(figure.name);
        setTimeout(() => setStatus(""), 2500);
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    async function handleCreate() {
      const figure = serializeForm();
      if (!figure.name) { setStatus("Name is required", true); return; }
      try {
        setStatus("Creating…");
        await api.create(figure);
        allFigures = await api.list();
        isCreating = false;
        selectedName = figure.name;
        populateForm(figure);
        renderList();
        setStatus("Created ✓");
        setTimeout(() => setStatus(""), 2500);
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    async function handleDelete() {
      if (!selectedName) return;
      if (!confirm(`Delete "${selectedName}"? This cannot be undone.`)) return;
      try {
        setStatus("Deleting…");
        await api.delete(selectedName);
        allFigures = await api.list();
        selectedName = null;
        document.getElementById("empty-state").classList.remove("hidden");
        document.getElementById("figure-form").classList.add("hidden");
        showEditorMode("none");
        renderList();
        setStatus("Deleted");
        setTimeout(() => setStatus(""), 2500);
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    // ── Variant tabs ───────────────────────────────────────────────────────────

    function wireVariantTabs(tabA, tabB, panelA, panelB) {
      document.querySelectorAll("[data-variant-tab]").forEach(btn => {
        btn.addEventListener("click", () => {
          const target = btn.dataset.variantTab;
          const isA = target.endsWith("-A");
          document.getElementById(`${panelA}`).classList.toggle("hidden", !isA);
          document.getElementById(`${panelB}`).classList.toggle("hidden", isA);
          document.querySelectorAll("[data-variant-tab]").forEach(b => {
            b.classList.toggle("active-variant-tab", b.dataset.variantTab === target);
          });
        });
      });
    }

    // ── Filter buttons ─────────────────────────────────────────────────────────

    function wireFilterButtons() {
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          currentFilter = btn.dataset.filter;
          document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active-filter"));
          btn.classList.add("active-filter");
          renderList();
        });
      });
    }

    // ── CLI panel ──────────────────────────────────────────────────────────────

    function updateCliPanel(name) {
      const el = document.getElementById("cli-commands");
      const n = JSON.stringify(name);
      el.innerHTML = [
        cliBlock("List all figures", `npm run agent -- run figures.list`),
        cliBlock("Get this figure", `npm run agent -- run figures.get name=${n}`),
        cliBlock("Delete this figure", `npm run agent -- run figures.delete name=${n}`),
        cliBlock("AI chat (tool call)", `# In agent interactive mode:\nnpm run agent\n> get the figure named ${name}`),
        cliBlock("API (curl)", `curl http://localhost:3000/api/figures/${encodeURIComponent(name)}`),
      ].join("");
    }

    function cliBlock(label, code) {
      return `
        <div class="space-y-1">
          <div class="text-[9px] font-mono text-slate-600 uppercase tracking-widest">${label}</div>
          <pre class="bg-[#0a0a14] border border-[#1a1a2e] rounded p-2 text-[10px] font-mono text-violet-300 overflow-x-auto whitespace-pre-wrap">${escHtml(code)}</pre>
        </div>`;
    }

    function toggleCli() {
      const panel = document.getElementById("cli-panel");
      const arrow = document.getElementById("cli-arrow");
      const hidden = panel.classList.toggle("hidden");
      arrow.textContent = hidden ? "▶" : "▼";
    }

    // ── Utilities ──────────────────────────────────────────────────────────────

    function showEditorMode(mode) {
      document.getElementById("editor-actions").classList.toggle("hidden", mode !== "edit");
      document.getElementById("editor-create-actions").classList.toggle("hidden", mode !== "create");
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById("editor-status");
      el.textContent = msg;
      el.style.color = isError ? "#fca5a5" : "#4a5568";
    }

    function escHtml(str) {
      return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function escAttr(str) {
      return String(str ?? "").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // ── Start ──────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
